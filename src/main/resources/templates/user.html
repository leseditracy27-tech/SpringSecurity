<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-text text-white">
        <b th:text="${#authentication.name}"></b> with roles:
        <span th:text="${#authentication.authorities}"></span>
    </span>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-2 bg-white border-end vh-100 pt-3">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active bg-primary text-white rounded">Admin</a>
                </li>
                <li class="nav-item mt-2">
                    <a class="nav-link text-primary" th:href="@{/user}">User</a>
                </li>
            </ul>
        </div>

        <!-- MAIN -->
        <div class="col-10 p-4">
            <h2>User Information Page</h2>

            <div class="card mt-3">
                <div class="card-header">
                    <b>About User</b>
                </div>

                <div class="card-body">
                    <table class="table table-striped text-center">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Roles</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr>
                            <td colspan="6" th:text="${username}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
