<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${user.id} != null ? 'Edit User' : 'Add User'">User Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        form {
            max-width: 400px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select {
            padding: 8px;
            width: 100%;
        }

        button {
            padding: 6px 15px;
            margin-top: 10px;
            cursor: pointer;
        }

        .error {
            border: 2px solid red;
        }

        .error-message {
            color: red;
            font-size: 13px;
        }
    </style>
</head>
<body>

<!-- 🔐 Header -->
<div class="top-bar">
    <h2 th:text="${user.id} != null ? 'Edit User' : 'Add User'"></h2>

    <form th:action="@{/logout}" method="post">
        <button type="submit">Logout</button>
    </form>
</div>

<br>

<form th:action="@{/admin/save}" th:object="${user}" method="post">

    <!-- CSRF -->
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <!-- Hidden ID -->
    <input type="hidden" th:field="*{id}"/>

    <!-- First Name -->
    <div class="form-group">
        <label for="firstName">First Name:</label>
        <input id="firstName" type="text" th:field="*{firstName}"
               th:classappend="${#fields.hasErrors('firstName')} ? 'error' : ''"/>
        <div class="error-message"
             th:if="${#fields.hasErrors('firstName')}"
             th:errors="*{firstName}"></div>
    </div>

    <!-- Last Name -->
    <div class="form-group">
        <label for="lastName">Last Name:</label>
        <input id="lastName" type="text" th:field="*{lastName}"
               th:classappend="${#fields.hasErrors('lastName')} ? 'error' : ''"/>
        <div class="error-message"
             th:if="${#fields.hasErrors('lastName')}"
             th:errors="*{lastName}"></div>
    </div>

    <!-- Email -->
    <div class="form-group">
        <label for="email">Email:</label>
        <input id="email" type="email" th:field="*{email}"
               th:classappend="${#fields.hasErrors('email')} ? 'error' : ''"/>
        <div class="error-message"
             th:if="${#fields.hasErrors('email')}"
             th:errors="*{email}"></div>
    </div>

    <!-- Age -->
    <div class="form-group">
        <label for="age">Age:</label>
        <input id="age" type="number" th:field="*{age}"
               th:classappend="${#fields.hasErrors('age')} ? 'error' : ''"/>
        <div class="error-message"
             th:if="${#fields.hasErrors('age')}"
             th:errors="*{age}"></div>
    </div>

    <!-- Password -->
    <div class="form-group">
        <label for="password">Password:</label>
        <input id="password" type="password" th:field="*{password}"
               th:placeholder="${user.id != null} ? 'Leave blank to keep' : ''"
               th:classappend="${#fields.hasErrors('password')} ? 'error' : ''"/>
        <div class="error-message"
             th:if="${#fields.hasErrors('password')}"
             th:errors="*{password}"></div>
    </div>

    <!-- Roles -->
    <div class="form-group">
        <label for="roles">Roles:</label>
        <select id="roles" name="roleIds" multiple size="3"
                th:classappend="${#fields.hasErrors('roles')} ? 'error' : ''">
            <option th:each="role : ${allRoles}"
                    th:value="${role.id}"
                    th:text="${role.name}"
                    th:selected="${user.roles != null} ? ${user.roles.contains(role)} : false">
            </option>
        </select>
        <div class="error-message" 
             th:if="${#fields.hasErrors('roles')}"
             th:errors="*{roles}"></div>
    </div>

    <!-- Submit -->
    <button type="submit"
            th:text="${user.id} != null ? 'Update' : 'Save'"></button>

</form>

<br>
<a th:href="@{/admin}">Back to Users List</a>

</body>
</html>
