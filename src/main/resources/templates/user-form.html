<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="UTF-8">
    <title>Add User</title>

    <!-- ✅ Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-sm p-4">

                <h4 class="text-center mb-4">Add new user</h4>

                <!-- ✅ FIXED ACTION -->
                <form th:action="@{/admin/save}" th:object="${user}" method="post">

                    <div class="mb-3">
                        <label>
                            <input type="text" th:field="*{firstName}" class="form-control" placeholder="First Name" required>
                        </label>
                    </div>

                    <div class="mb-3">
                        <label>
                            <input type="text" th:field="*{lastName}" class="form-control" placeholder="Last Name" required>
                        </label>
                    </div>

                    <div class="mb-3">
                        <label>
                            <input type="number" th:field="*{age}" class="form-control" placeholder="Age" required>
                        </label>
                    </div>

                    <div class="mb-3">
                        <label>
                            <input type="email" th:field="*{email}" class="form-control" placeholder="Email" required>
                        </label>

                        <!-- ✅ ERROR MESSAGE GOES HERE -->
                        <div class="text-danger"
                             th:if="${#fields.hasErrors('email')}"
                             th:errors="*{email}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label>
                            <input type="password" th:field="*{password}" class="form-control" placeholder="Password" required>
                        </label>
                    </div>

                    <!-- ✅ FIXED ROLES -->
                    <div class="mb-3">
                        <label class="form-label">Role</label>

                        <label>
                            <select name="roleIds" class="form-select" multiple required>
                                <option th:each="role : ${allRoles}"
                                        th:value="${role.id}"
                                        th:text="${role.name}"
                                        th:selected="${user.roles.contains(role)}">
                                </option>
                            </select>
                        </label>

                        <div class="text-danger"
                             th:if="${#fields.hasErrors('roles')}"
                             th:errors="*{roles}">
                        </div>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-success px-4">
                            Add new user
                        </button>
                    </div>

                </form>

            </div>

        </div>
    </div>

</div>

</body>
</html>
