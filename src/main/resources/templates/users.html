<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>

<h2>Users List</h2>

<!-- 🔐 Logout -->
<form th:action="@{/logout}" method="post">
    <button type="submit">Logout</button>
</form>

<br>

<a th:href="@{/admin/form}">Add New User</a>

<table border="1">
    <tr>
        <th>ID</th><th>First Name</th><th>Last Name</th><th>Email</th><th>Age</th><th>Actions</th>
    </tr>

    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.firstName}"></td>
        <td th:text="${user.lastName}"></td>
        <td th:text="${user.email}"></td>
        <td th:text="${user.age}"></td>

        <td>
            <div sec:authorize="hasRole('ADMIN')">
                <a th:href="@{'/admin/form/' + ${user.id}}">Edit</a>

                <form th:action="@{'/admin/delete/' + ${user.id}}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit">Delete</button>
                </form>
            </div>
        </td>
    </tr>
</table>

</body>
</html>
