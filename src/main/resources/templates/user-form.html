<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<h2 th:text="${user.id} != null ? 'Edit User' : 'Add User'"></h2>

<!-- 🔐 Logout -->
<form th:action="@{/logout}" method="post">
    <button type="submit">Logout</button>
</form>

<br>

<form th:action="@{/admin/save}" th:object="${user}" method="post">

    <!-- CSRF -->
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <input type="hidden" th:field="*{id}"/>

    <label>First Name:</label>
    <input type="text" th:field="*{firstName}"/>

    <br><br>

    <label>Last Name:</label>
    <input type="text" th:field="*{lastName}"/>

    <br><br>

    <label>Email:</label>
    <input type="email" th:field="*{email}"/>

    <br><br>

    <label>Age:</label>
    <input type="number" th:field="*{age}"/>

    <br><br>

    <!-- 🔐 Password -->
    <label>Password:</label>
    <input type="password" th:field="*{password}"/>

    <br><br>

    <!-- 🔐 Roles (FIXED) -->
    <label>Roles:</label>
    <select name="roleIds" multiple>
        <option th:each="role : ${allRoles}"
                th:value="${role.id}"
                th:text="${role.name}"
                th:selected="${user.roles != null and user.roles.contains(role)}">
        </option>
    </select>

    <br><br>

    <button type="submit"
            th:text="${user.id} != null ? 'Update' : 'Save'"></button>

</form>

<br>
<a th:href="@{/admin}">Back to Users List</a>

</body>
</html>
