<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-text text-white">
        <b th:text="${#authentication.name}"></b>
        with roles:
        <span th:text="${#authentication.authorities}"></span>
    </span>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-2 bg-white border-end vh-100 pt-3">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active bg-primary text-white rounded">Admin</a>
                </li>
                <li class="nav-item mt-2">
                    <a class="nav-link text-primary" th:href="@{/user}">User</a>
                </li>
            </ul>
        </div>

        <!-- MAIN -->
        <div class="col-10 p-4">
            <h2>Admin panel</h2>

            <!-- Tabs -->
            <ul class="nav nav-tabs mt-3">
                <li class="nav-item">
                    <a class="nav-link active">All Users</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/form}">New User</a>
                </li>
            </ul>

            <!-- TABLE -->
            <div class="card mt-3">
                <div class="card-header">
                    <b>All Users</b>
                </div>

                <div class="card-body" style="max-height: 400px; overflow-y: auto;">
                    <table class="table table-striped text-center align-middle">

                        <thead class="table-dark" style="position: sticky; top: 0;">
                        <tr>
                            <th>#</th>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Roles</th>
                            <th>Edit</th>
                            <th>Delete</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="user, stat : ${users}">
                            <td th:text="${stat.count}"></td>
                            <td th:text="${user.id}"></td>
                            <td th:text="${user.firstName}"></td>
                            <td th:text="${user.lastName}"></td>
                            <td th:text="${user.age}"></td>
                            <td th:text="${user.email}"></td>

                            <td th:text="${user.simpleRoles}"></td>

                            <!-- EDIT -->
                            <td>
                                <button class="btn btn-info btn-sm text-white"
                                        data-bs-toggle="modal"
                                        data-bs-target="#editUserModal"
                                        th:attr="
                                            data-id=${user.id},
                                            data-firstname=${user.firstName},
                                            data-lastname=${user.lastName},
                                            data-age=${user.age},
                                            data-email=${user.email},
                                            data-roles=${user.roleIds}">
                                    Edit
                                </button>
                            </td>

                            <!-- DELETE -->
                            <td>
                                <button class="btn btn-danger btn-sm"
                                        data-bs-toggle="modal"
                                        data-bs-target="#deleteUserModal"
                                        th:attr="
                                            data-id=${user.id},
                                            data-name=${user.firstName} + ' ' + ${user.lastName}">
                                    Delete
                                </button>
                            </td>

                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- ================= EDIT MODAL ================= -->
<div class="modal fade" id="editUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Edit User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <!-- 🔥 IMPORTANT -->
            <form th:action="@{/admin/save}" th:object="${user}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="modal-body">

                    <input type="hidden" id="editId" th:field="*{id}">

                    <div class="mb-3">
                        <label>First Name</label>
                        <input type="text" id="editFirstName" th:field="*{firstName}" class="form-control">
                        <div class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                    </div>

                    <div class="mb-3">
                        <label>Last Name</label>
                        <input type="text" id="editLastName" th:field="*{lastName}" class="form-control">
                        <div class="text-danger" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                    </div>

                    <div class="mb-3">
                        <label>Age</label>
                        <input type="number" id="editAge" th:field="*{age}" class="form-control">
                        <div class="text-danger" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></div>
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" id="editEmail" th:field="*{email}" class="form-control">
                        <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" th:field="*{password}" class="form-control"
                               placeholder="Leave blank to keep current">
                    </div>

                    <div class="mb-3">
                        <label>Roles</label>
                        <select name="roleIds" id="editRoles" class="form-control" multiple>
                            <option th:each="role : ${allRoles}"
                                    th:value="${role.id}"
                                    th:text="${role.name.replace('ROLE_', '')}">
                            </option>
                        </select>
                        <div class="text-danger" th:if="${#fields.hasErrors('roles')}" th:errors="*{roles}"></div>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>

            </form>

        </div>
    </div>
</div>

<!-- ================= DELETE MODAL ================= -->
<div class="modal fade" id="deleteUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <form th:action="@{/admin/delete}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="modal-body text-center">
                    <input type="hidden" id="deleteId" name="id">
                    <p>Are you sure?</p>
                    <h5 id="deleteUserName" class="text-danger"></h5>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-danger">Delete</button>
                </div>

            </form>

        </div>
    </div>
</div>

<!-- ================= SCRIPT ================= -->
<script>
    document.addEventListener("DOMContentLoaded", function () {

        const editModal = document.getElementById('editUserModal');

        editModal.addEventListener('show.bs.modal', function (event) {
            const button = event.relatedTarget;

            document.getElementById('editId').value = button.getAttribute('data-id');
            document.getElementById('editFirstName').value = button.getAttribute('data-firstname');
            document.getElementById('editLastName').value = button.getAttribute('data-lastname');
            document.getElementById('editAge').value = button.getAttribute('data-age');
            document.getElementById('editEmail').value = button.getAttribute('data-email');

            // ✅ FIXED ROLE SELECTION
            const roles = button.getAttribute('data-roles');
            const roleArray = roles ? roles.split(',') : [];

            const select = document.getElementById('editRoles');

            Array.from(select.options).forEach(option => {
                option.selected = roleArray.includes(option.value);
            });
        });

        const deleteModal = document.getElementById('deleteUserModal');
        deleteModal.addEventListener('show.bs.modal', function (event) {
            const button = event.relatedTarget;

            document.getElementById('deleteId').value = button.getAttribute('data-id');
            document.getElementById('deleteUserName').textContent = button.getAttribute('data-name');
        });

    });
</script>

<!-- 🔥 REOPEN EDIT MODAL ON ERROR -->
<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function () {

        const shouldOpen = /*[[${showEditModal}]]*/ false;

        if (shouldOpen) {
            const modal = new bootstrap.Modal(document.getElementById('editUserModal'));
            modal.show();
        }

    })
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
