<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>

    <!-- ✅ Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- 🔹 Header -->
    <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-white shadow-sm rounded">
        <h3 class="mb-0">User Dashboard</h3>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-danger">Logout</button>
        </form>
    </div>

    <!-- 🔹 Centered Card -->
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg border-0">
                <div class="card-body p-4">

                    <h4 class="mb-4 text-center">Welcome 👋</h4>

                    <div class="mb-3">
                        <strong>First Name:</strong>
                        <span th:text="${user.firstName}" class="ms-2"></span>
                    </div>

                    <div class="mb-3">
                        <strong>Last Name:</strong>
                        <span th:text="${user.lastName}" class="ms-2"></span>
                    </div>

                    <div class="mb-3">
                        <strong>Email:</strong>
                        <span th:text="${user.email}" class="ms-2"></span>
                    </div>

                    <div class="mb-3">
                        <strong>Age:</strong>
                        <span th:text="${user.age}" class="ms-2"></span>
                    </div>

                    <!-- ✅ Roles -->
                    <div class="mb-3">
                        <strong>Roles:</strong>
                        <div class="mt-2">
                            <span th:each="role : ${user.roles}"
                                  th:text="${role.name}"
                                  class="badge bg-primary me-1 px-3 py-2">
                            </span>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

</div>

<!-- ✅ Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
