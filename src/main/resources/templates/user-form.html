<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- 🔹 NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="text-white">
        <b th:text="${#authentication.name}"></b>
        with roles:
        <span th:text="${#authentication.authorities}"></span>
    </span>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- 🔹 SIDEBAR -->
        <div class="col-2 bg-white border-end vh-100 pt-3">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link text-primary" th:href="@{/admin}">Admin</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/user}">User</a>
                </li>
            </ul>
        </div>

        <!-- 🔹 MAIN -->
        <div class="col-10 p-4">

            <h2>Admin panel</h2>

            <!-- TABS -->
            <ul class="nav nav-tabs mt-3">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin}">All Users</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active">New User</a>
                </li>
            </ul>

            <!-- ✅ FORM CARD -->
            <div class="card mt-3">
                <div class="card-header">
                    <b>Add new user</b>
                </div>

                <div class="card-body">

                    <form th:action="@{/admin/save}" th:object="${user}" method="post">

                        <div class="row justify-content-center">
                            <div class="col-md-4 text-center">

                                <label class="fw-bold">First Name</label>
                                <input type="text" th:field="*{firstName}" class="form-control mb-3">

                                <label class="fw-bold">Last Name</label>
                                <input type="text" th:field="*{lastName}" class="form-control mb-3">

                                <label class="fw-bold">Age</label>
                                <input type="number" th:field="*{age}" class="form-control mb-3">

                                <label class="fw-bold">Email</label>
                                <input type="email" th:field="*{email}" class="form-control mb-3">

                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('email')}"
                                     th:errors="*{email}">
                                </div>

                                <label class="fw-bold">Password</label>
                                <input type="password" th:field="*{password}" class="form-control mb-3">

                                <label class="fw-bold">Role</label>
                                <select name="roleIds" class="form-select mb-3" multiple>
                                    <option th:each="r : ${allRoles}"
                                            th:value="${r.id}"
                                            th:text="${r.name.replace('ROLE_', '')}">
                                    </option>
                                </select>

                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('roles')}"
                                     th:errors="*{roles}">
                                </div>

                                <button type="submit" class="btn btn-success">
                                    Add new user
                                </button>

                            </div>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
