<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <!-- ✅ Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- ✅ TOP NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-text text-white">
        <b th:text="${#authentication.name}"></b>
        with roles:
        <span th:text="${#authentication.authorities}"></span>
    </span>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- ✅ SIDEBAR -->
        <div class="col-2 bg-white border-end vh-100 pt-3">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active bg-primary text-white rounded">Admin</a>
                </li>
                <li class="nav-item mt-2">
                    <a class="nav-link text-primary" th:href="@{/user}">User</a>
                </li>
            </ul>
        </div>

        <!-- ✅ MAIN CONTENT -->
        <div class="col-10 p-4">

            <h2>Admin panel</h2>

            <!-- Tabs -->
            <ul class="nav nav-tabs mt-3">
                <li class="nav-item">
                    <a class="nav-link active">All Users</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/form}">New User</a>
                </li>
            </ul>

            <!-- Table -->
            <div class="card mt-3">
                <div class="card-header">
                    <b>All Users</b>
                </div>

                <!-- 🔥 SCROLL FIX -->
                <div class="card-body" style="max-height: 400px; overflow-y: auto;">

                    <table class="table table-striped text-center align-middle">

                        <!-- 🔥 STICKY HEADER -->
                        <thead class="table-dark" style="position: sticky; top: 0;">
                        <tr>
                            <th>#</th>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Roles</th>
                            <th>Edit</th>
                            <th>Delete</th>
                        </tr>
                        </thead>

                        <tbody>
                        <!-- 🔥 NUMBERING FIX -->
                        <tr th:each="user, stat : ${users}">
                            <td th:text="${stat.count}"></td>
                            <td th:text="${user.id}"></td>
                            <td th:text="${user.firstName}"></td>
                            <td th:text="${user.lastName}"></td>
                            <td th:text="${user.age}"></td>
                            <td th:text="${user.email}"></td>

                            <td>
                                <span th:each="role : ${user.roles}"
                                      th:text="'[' + ${role.name.replace('ROLE_', '')} + ']'">
                                </span>
                            </td>

                            <!-- ✅ EDIT -->
                            <td>
                                <button class="btn btn-info btn-sm text-white"
                                        data-bs-toggle="modal"
                                        data-bs-target="#editUserModal"
                                        th:attr="
                                            data-id=${user.id},
                                            data-firstname=${user.firstName},
                                            data-lastname=${user.lastName},
                                            data-age=${user.age},
                                            data-email=${user.email}">

                                    Edit
                                </button>
                            </td>

                            <!-- DELETE -->
                            <td>
                                <form th:action="@{/admin/delete/{id}(id=${user.id})}" method="post">
                                    <button class="btn btn-danger btn-sm">Delete</button>
                                </form>
                            </td>

                        </tr>
                        </tbody>

                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- ✅ EDIT MODAL -->
<div class="modal fade" id="editUserModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Edit user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <form th:action="@{/admin/save}" method="post">
                <div class="modal-body text-center">

                    <input type="hidden" id="editId" name="id">

                    <div class="mb-3">
                        <label class="fw-bold">First Name</label>
                        <label for="editFirstName"></label><input type="text" id="editFirstName" name="firstName" class="form-control text-center">
                    </div>

                    <div class="mb-3">
                        <label class="fw-bold">Last Name</label>
                        <label for="editLastName"></label><input type="text" id="editLastName" name="lastName" class="form-control text-center">
                    </div>

                    <div class="mb-3">
                        <label class="fw-bold">Age</label>
                        <label for="editAge"></label><input type="number" id="editAge" name="age" class="form-control text-center">
                    </div>

                    <div class="mb-3">
                        <label class="fw-bold">Email</label>
                        <label for="editEmail"></label><input type="email" id="editEmail" name="email" class="form-control text-center">
                    </div>

                    <div class="mb-3">
                        <label class="fw-bold">Password</label>
                        <label>
                            <input type="password" name="password" class="form-control text-center"
                                   placeholder="Leave blank to keep current">
                        </label>
                    </div>

                    <!-- ✅ ROLES -->
                    <div class="mb-3">
                        <label class="fw-bold">Role</label>
                        <label>
                            <select name="roleIds" class="form-select text-center" multiple>
                                <option th:each="role : ${allRoles}"
                                        th:value="${role.id}"
                                        th:text="${role.name.replace('ROLE_', '')}">
                                </option>
                            </select>
                        </label>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Close
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Edit
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>

<script>
    const editModal = document.getElementById('editUserModal');

    editModal.addEventListener('show.bs.modal', function (event) {
        const button = event.relatedTarget;

        document.getElementById('editId').value = button.getAttribute('data-id');
        document.getElementById('editFirstName').value = button.getAttribute('data-firstname');
        document.getElementById('editLastName').value = button.getAttribute('data-lastname');
        document.getElementById('editAge').value = button.getAttribute('data-age');
        document.getElementById('editEmail').value = button.getAttribute('data-email');

        // 🔥 FIX: AUTO SELECT ROLES
        const roles = button.getAttribute('data-roles');
        const roleArray = roles ? roles.split(',') : [];

        const select = document.querySelector('select[name="roleIds"]');

        Array.from(select.options).forEach(option => {
            option.selected = roleArray.includes(option.value);
        });
    });
</script>

<!-- ✅ Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
