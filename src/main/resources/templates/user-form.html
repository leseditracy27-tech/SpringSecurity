<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Form</title>
</head>
<body>

<h2 th:text="${user.id} != null ? 'Edit User' : 'Add User'"></h2>

<!-- 🔐 Logout -->
<form th:action="@{/logout}" method="post">
    <button type="submit">Logout</button>
</form>

<br>

<form th:action="@{/admin/save}" th:object="${user}" method="post">

    <!-- CSRF -->
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <input type="hidden" th:field="*{id}"/>

    <!-- ✅ First Name -->
    <label for="firstName">First Name:</label>
    <input id="firstName" type="text" th:field="*{firstName}"/>

    <br><br>

    <!-- ✅ Last Name -->
    <label for="lastName">Last Name:</label>
    <input id="lastName" type="text" th:field="*{lastName}"/>

    <br><br>

    <!-- ✅ Email -->
    <label for="email">Email:</label>
    <input id="email" type="email" th:field="*{email}"/>

    <br><br>

    <!-- ✅ Age -->
    <label for="age">Age:</label>
    <input id="age" type="number" th:field="*{age}"/>

    <br><br>

    <!-- 🔐 Password -->
    <label for="password">Password:</label>
    <input id="password" type="password" th:field="*{password}"/>

    <br><br>

    <!-- 🔐 Roles -->
    <label for="roles">Roles:</label>
    <select id="roles" name="roleIds" multiple>
        <option th:each="role : ${allRoles}"
                th:value="${role.id}"
                th:text="${role.name}"
                th:selected="${#lists.contains(user.roles, role)}">
        </option>
    </select>

    <br><br>

    <button type="submit"
            th:text="${user.id} != null ? 'Update' : 'Save'"></button>

</form>

<br>
<a th:href="@{/admin}">Back to Users List</a>

</body>
</html>
