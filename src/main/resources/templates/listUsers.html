<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSRF -->
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-text text-white">
        <b th:text="${#authentication.name}"></b>
    </span>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-2 bg-white border-end vh-100 pt-3">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active bg-primary text-white rounded">Admin</a>
                </li>
                <li class="nav-item mt-2">
                    <a class="nav-link text-primary" th:href="@{/user}">User</a>
                </li>
            </ul>
        </div>

        <!-- MAIN -->
        <div class="col-10 p-4">
            <h2>Admin panel</h2>

            <div class="card mt-3">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <b>All Users</b>

                    <!-- ✅ NEW USER BUTTON -->
                    <button class="btn btn-success btn-sm"
                            type="button"
                            onclick="openCreateModal()">
                        New User
                    </button>
                </div>

                <div class="card-body">
                    <table class="table table-striped text-center align-middle">
                        <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Roles</th>
                            <th>Edit</th>
                            <th>Delete</th>
                        </tr>
                        </thead>

                        <tbody id="userTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ================= CREATE MODAL ================= -->
<div class="modal fade" id="createUserModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5>New User</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <div class="mb-3">
                    <label class="form-label">First Name</label>
                    <input id="newFirstName" class="form-control" placeholder="Enter first name">
                    <div class="text-danger small" id="newFirstNameError"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Last Name</label>
                    <input id="newLastName" class="form-control" placeholder="Enter last name">
                    <div class="text-danger small" id="newLastNameError"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Age</label>
                    <input id="newAge" type="number" class="form-control" placeholder="Enter age">
                    <div class="text-danger small" id="newAgeError"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input id="newEmail" class="form-control" placeholder="Enter email">
                    <div class="text-danger small" id="newEmailError"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input id="newPassword" type="password" class="form-control" placeholder="Enter password">
                    <div class="text-danger small" id="newPasswordError"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select id="newRoles" class="form-select" multiple>
                        <option th:each="role : ${allRoles}"
                                th:value="${role.id}"
                                th:text="${role.name.replace('ROLE_', '')}">
                        </option>
                    </select>
                </div>

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-success" type="button" onclick="createUser()">Create</button>
            </div>

        </div>
    </div>
</div>

<!-- ================= EDIT MODAL ================= -->
<div class="modal fade" id="editUserModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5>Edit User</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <input type="hidden" id="editId">

                <div class="mb-3">
                    <label class="form-label">First Name</label>
                    <input id="editFirstName" class="form-control" placeholder="Enter first name">
                    <div class="text-danger small" id="editFirstNameError"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Last Name</label>
                    <input id="editLastName" class="form-control" placeholder="Enter last name">
                    <div class="text-danger small" id="editLastNameError"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Age</label>
                    <input id="editAge" type="number" class="form-control" placeholder="Enter age">
                    <div class="text-danger small" id="editAgeError"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input id="editEmail" class="form-control" placeholder="Enter email">
                    <div class="text-danger small" id="editEmailError"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input id="editPassword" type="password" class="form-control" placeholder="Enter password">
                    <div class="text-danger small" id="editPasswordError"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select id="editRoles" class="form-select" multiple>
                        <option th:each="role : ${allRoles}"
                                th:value="${role.id}"
                                th:text="${role.name.replace('ROLE_', '')}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" type="button" onclick="updateUser()">Save</button>
            </div>

        </div>
    </div>
</div>

<!-- ================= DELETE MODAL ================= -->
<div class="modal fade" id="deleteUserModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-body text-center">
                <input type="hidden" id="deleteId">
                <p>Are you sure?</p>
                <h5 id="deleteUserName" class="text-danger"></h5>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-danger" type="button" onclick="deleteUser()">Delete</button>
            </div>

        </div>
    </div>
</div>
<!-- ✅ ADD TOAST RIGHT HERE -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
    <div id="appToast" class="toast align-items-center text-white bg-success border-0">
        <div class="d-flex">
            <div class="toast-body" id="toastMessage">
                Success
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<!-- ================= JS ================= -->
<script>
    document.addEventListener("DOMContentLoaded", loadUsers);

    function csrf() {
        return {
            header: document.querySelector('meta[name="_csrf_header"]').content,
            token: document.querySelector('meta[name="_csrf"]').content
        };
    }
    function showBackendErrors(errors, prefix) {

        // clear old errors
        document.querySelectorAll("[id$='Error']").forEach(e => e.textContent = "");

        for (let field in errors) {
            const errorDiv = document.getElementById(prefix + capitalize(field) + "Error");

            if (errorDiv) {
                errorDiv.textContent = errors[field];
            }
        }
    }

    function capitalize(str) {
        return str.charAt(0).toUpperCase() + str.slice(1);
    }
    function showToast(message, type = "success") {

        const toastEl = document.getElementById("appToast");
        const toastMsg = document.getElementById("toastMessage");

        toastMsg.textContent = message;

        toastEl.classList.remove("bg-success", "bg-danger", "bg-warning");

        if (type === "success") toastEl.classList.add("bg-success");
        if (type === "error") toastEl.classList.add("bg-danger");
        if (type === "warning") toastEl.classList.add("bg-warning");

        const toast = new bootstrap.Toast(toastEl);
        toast.show();
    }
    function loadUsers() {
        fetch('/api/users', { credentials: 'same-origin' })
            .then(res => res.json())
            .then(data => {
                const users = data.content;
                const table = document.getElementById("userTable");
                table.innerHTML = "";

                users.forEach((u, i) => {
                    table.innerHTML += `
                <tr>
                    <td>${i + 1}</td>
                    <td>${u.id}</td>
                    <td>${u.firstName}</td>
                    <td>${u.lastName}</td>
                    <td>${u.age}</td>
                    <td>${u.email}</td>
                    <td>${u.simpleRoles}</td>

                    <td>
                        <button class="btn btn-info btn-sm text-white"
                                onclick="openEdit(${u.id})">Edit</button>
                    </td>

                    <td>
                        <button class="btn btn-danger btn-sm"
                                onclick="openDelete(${u.id}, '${u.firstName} ${u.lastName}')">Delete</button>
                    </td>
                </tr>`;
                });
            });
    }

    /* ================= CREATE ================= */

    function openCreateModal() {
        new bootstrap.Modal(document.getElementById('createUserModal')).show();
    }

    function validateCreateForm() {
        let valid = true;

        document.querySelectorAll("[id$='Error']").forEach(e => e.textContent = "");

        if (!newFirstName.value.trim()) {
            newFirstNameError.textContent = "First name is required";
            valid = false;
        }

        if (!newLastName.value.trim()) {
            newLastNameError.textContent = "Last name is required";
            valid = false;
        }

        if (!newAge.value || newAge.value <= 0) {
            newAgeError.textContent = "Valid age required";
            valid = false;
        }

        if (!newEmail.value.trim()) {
            newEmailError.textContent = "Email is required";
            valid = false;
        }

        if (!newPassword.value.trim()) {
            newPasswordError.textContent = "Password is required";
            valid = false;
        }

        return valid;
    }

    function createUser() {

        if (!validateCreateForm()) return; // 🚨 STOP if invalid

        const c = csrf();

        const user = {
            firstName: newFirstName.value,
            lastName: newLastName.value,
            age: parseInt(newAge.value),
            email: newEmail.value,
            password: newPassword.value,
            roleIds: Array.from(newRoles.selectedOptions).map(o => parseInt(o.value))
        };

        fetch('/api/users', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                [c.header]: c.token
            },
            credentials: 'same-origin',
            body: JSON.stringify(user)
        })
            .then(res => {
                if (!res.ok) {
                    return res.json().then(errors => {
                        throw errors
                    });
                }
                return res;
            })
            .then(() => {
                bootstrap.Modal.getInstance(
                    document.getElementById('createUserModal')
                ).hide();
                showToast("User created successfully ✅");
                loadUsers();
            })
            .catch(errors => {
                showBackendErrors(errors, "new");
            });
    }


    /* ================= EDIT ================= */

    function openEdit(id) {
        fetch(`/api/users/${id}`, { credentials: 'same-origin' })
            .then(res => res.json())
            .then(user => {

                editId.value = user.id;
                editFirstName.value = user.firstName;
                editLastName.value = user.lastName;
                editAge.value = user.age;
                editEmail.value = user.email;
                editPassword.value = "";

                Array.from(editRoles.options).forEach(o => {
                    o.selected = user.roleIds.includes(Number(o.value));
                });

                new bootstrap.Modal(document.getElementById('editUserModal')).show();
            });
    }

    function updateUser() {
        const c = csrf();
        const id = editId.value;

        const user = {
            id: Number(id),
            firstName: editFirstName.value,
            lastName: editLastName.value,
            age: parseInt(editAge.value),
            email: editEmail.value,
            password: editPassword.value,
            roleIds: Array.from(editRoles.selectedOptions).map(o => parseInt(o.value))
        };

        fetch(`/api/users/${id}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                [c.header]: c.token
            },
            credentials: 'same-origin',
            body: JSON.stringify(user)
        })
            .then(res => {
                if (!res.ok) {
                    return res.json().then(errors => { throw errors });
                }
                return res;
            })
            .then(() => {
                bootstrap.Modal.getInstance(
                    document.getElementById('editUserModal')
                ).hide();
                showToast("User updated successfully ✏️");

                loadUsers();
            })
            .catch(errors => {
                showBackendErrors(errors, "edit"); // ✅ THIS IS THE KEY LINE
            });
    }


    /* ================= DELETE ================= */

    function openDelete(id, name) {
        deleteId.value = id;
        deleteUserName.textContent = name;
        new bootstrap.Modal(document.getElementById('deleteUserModal')).show();
    }

    function deleteUser() {
        const c = csrf();

        fetch(`/api/users/${deleteId.value}`, {
            method: 'DELETE',
            headers: { [c.header]: c.token },
            credentials: 'same-origin'
        })
            .then(() => {
                bootstrap.Modal.getInstance(document.getElementById('deleteUserModal')).hide();
                showToast("User deleted successfully 🗑️");
                loadUsers();
            });
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
