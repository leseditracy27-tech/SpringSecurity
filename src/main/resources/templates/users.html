<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Panel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- 🔹 NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="text-white">
        <b th:text="${#authentication.name}"></b>
        with roles:
        <span th:text="${#authentication.authorities}"></span>
    </span>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- 🔹 SIDEBAR -->
        <div class="col-2 bg-white border-end vh-100 pt-3">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin}">Admin</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active bg-primary text-white rounded">User</a>
                </li>
            </ul>
        </div>

        <!-- 🔹 MAIN -->
        <div class="col-10 p-4">

            <h2>User information-page</h2>

            <!-- TAB -->
            <ul class="nav nav-tabs mt-3">
                <li class="nav-item">
                    <a class="nav-link active">User</a>
                </li>
            </ul>

            <!-- ✅ TABLE (REPLACED SECTION) -->
            <div class="card mt-3">
                <div class="card-header">
                    <b>About User</b>
                </div>

                <div class="card-body">

                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Roles</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr>
                            <td th:text="${user.id}"></td>
                            <td th:text="${user.firstName}"></td>
                            <td th:text="${user.lastName}"></td>
                            <td th:text="${user.age}"></td>
                            <td th:text="${user.email}"></td>
                            <td>
                                <span th:each="r : ${user.roles}"
                                      th:text="${r.name.replace('ROLE_', '') + ' '}">
                                </span>
                            </td>
                        </tr>
                        </tbody>

                    </table>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
